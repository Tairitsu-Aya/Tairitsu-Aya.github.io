title: "帕秋莉的小图书馆"
subtitle: "七曜魔法使驻人里使馆，森罗万象收集册"
lang: "zh-CN"
timezone: "Asia/Shanghai"

# GitHub Pages production URL
url: "https://Tairitsu-Aya.github.io"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter_opts:
    block:
      line_numbers: false

permalink: /:categories/:year/:month/:day/:title/

# Plugins supported by GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      toc: true

# Theme options
theme_vars:
  enable_subscribe: true           # 一键开关订阅入口（页眉/页脚的订阅按钮）
  enable_toc: true                 # 全站开启目录（单篇可用 toc:false 关闭）
  enable_giscus: true             # 开关评论（单篇可用 comments:false 关闭）
  enable_plausible: true
  plausible_domain: "tairitsu-aya.github.io"
  primary_color: "#c8b6ff"         # 淡紫
  primary_soft: "#e9ddff"
  accent_yellow: "#ffd95a"
  text_color: "#1a1a1a"
  bg_color: "#ffffff"
  max_width: "900px"

# Giscus（需在 _includes/giscus.html 中填入 repo_id/category_id 等，占位在这里）
giscus:
  repo: "Tairitsu-Aya/Tairitsu-Aya.github.io"
  repo_id: "REPO_ID_PLACEHOLDER"
  category: "General"
  category_id: "CATEGORY_ID_PLACEHOLDER"
  mapping: "pathname"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: "bottom"
  theme: "light"
  lang: "zh-CN"
  crossorigin: "anonymous"

# Navigation (labels shown in中文，链接路径尽量使用英文slug)
navigation:
  - name: "主页"
    url: "/"
  - name: "文章"
    url: "/posts/"
  - name: "项目"
    url: "/projects/"
  - name: "杂物"
    url: "/misc/"
  - name: "关于我"
    url: "/about/"
  - name: "联系我"
    url: "/contact/"

# Socials
socials:
  github: "https://github.com/Tairitsu-Aya"
  bilibili: "https://space.bilibili.com/37408192?spm_id_from=333.1007.0.0"

# Exclusions
exclude:
  - README.md
  - node_modules
  - package.json
  - package-lock.json

logo: "/assets/img/logo.svg"
image: "/assets/img/og-default.svg"
header_image: "/assets/img/cover-default.svg"
