title: "帕秋莉的小图书馆"
subtitle: "七曜魔法使驻人里使馆，森罗万象收集册"
lang: "zh-CN"
timezone: "Asia/Shanghai"

url: "https://Tairitsu-Aya.github.io"
baseurl: ""

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter_opts:
    block:
      line_numbers: false

permalink: /:categories/:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      toc: true

theme_vars:
  enable_subscribe: true
  enable_toc: true
  enable_giscus: true
  enable_plausible: true
  plausible_domain: "tairitsu-aya.github.io"
  primary_color: "#c8b6ff"
  primary_soft: "#e9ddff"
  accent_yellow: "#ffd95a"
  text_color: "#1a1a1a"
  bg_color: "#ffffff"
  max_width: "900px"

giscus:
  repo: "Tairitsu-Aya/Tairitsu-Aya.github.io"
  repo_id: "REPO_ID_PLACEHOLDER"
  category: "General"
  category_id: "CATEGORY_ID_PLACEHOLDER"
  mapping: "pathname"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: "bottom"
  theme: "light"
  lang: "zh-CN"
  crossorigin: "anonymous"

navigation:
  - name: "主页"
    url: "/"
  - name: "文章"
    url: "/posts/"
  - name: "项目"
    url: "/projects/"
  - name: "杂物"
    url: "/misc/"
  - name: "关于我"
    url: "/about/"
  - name: "联系我"
    url: "/contact/"

socials:
  github: "https://github.com/Tairitsu-Aya"
  bilibili: "https://space.bilibili.com/37408192?spm_id_from=333.1007.0.0"

logo: "/assets/img/logo.svg"
image: "/assets/img/og-default.svg"
header_image: "/assets/img/cover-default.svg"

exclude:
  - README.md
  - node_modules
  - package.json
  - package-lock.json
