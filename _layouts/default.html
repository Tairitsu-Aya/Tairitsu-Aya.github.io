<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.subtitle }}">
    <link rel="icon" href="{{ '/assets/img/favicon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    {% seo %}

    {%- if site.theme_vars.enable_subscribe %}
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }} feed" href="{{ '/feed.xml' | relative_url }}">
    {%- endif %}

    <!-- KaTeX for math -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8RvQ5fD9oY8hQp4nKgi0rZ5O+S8mU8b6t5tgqv9s7rWvQ4wFdJwJXjS5k6L/6LE" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-y6xZ5mIqkV/3K6h4qV2rwOeWcZ0Xv1uG+3ZcgkH1p5g0K2Sx6sW1dH2l1Yo0xQ2w" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-mll67dPik/0lI4i9q1eY0r3kQ3f1yF2h5jzI1CkJ9xwz8P2m8l3YHhJz5bq3Xf2/" crossorigin="anonymous"
      onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}]});"></script>

    <!-- Plausible Analytics -->
    {%- if site.theme_vars.enable_plausible and site.theme_vars.plausible_domain -%}
    <script defer data-domain="{{ site.theme_vars.plausible_domain }}" src="https://plausible.io/js/script.js"></script>
    {%- endif -%}
  </head>
  <body>
    {% include header.html %}
    <main class="container fade-in">
      {{ content }}
    </main>
    {% include footer.html %}
    <script src="{{ '/assets/js/toc.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  </body>
</html>
