<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
      (function() {
        try {
          var key = 'pl-theme';
          var saved = localStorage.getItem(key);
          var use = saved ? saved : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', use);
        } catch(e){}
      })();
    </script>
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.subtitle }}">
    <link rel="icon" href="{{ '/assets/img/favicon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    {% seo %}

    {%- if site.theme_vars.enable_subscribe %}
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }} feed" href="{{ '/feed.xml' | relative_url }}">
    {%- endif %}

    <!-- KaTeX for math -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        if (window.renderMathInElement) {
          renderMathInElement(document.body, {
            delimiters: [
              {left: "$$", right: "$$", display: true},
              {left: "$",  right: "$",  display: false},
              {left: "\\(", right: "\\)", display: false},
              {left: "\\[", right: "\\]", display: true}
            ],
            ignoredTags: ["script","noscript","style","textarea","pre","code"]
          });
        }
      });
    </script>

    <!-- Plausible Analytics -->
    {%- if site.theme_vars.enable_plausible and site.theme_vars.plausible_domain -%}
    <script defer data-domain="{{ site.theme_vars.plausible_domain }}" src="https://plausible.io/js/script.js"></script>
    {%- endif -%}
  </head>
  <body>
    {% include header.html %}
    <main class="container fade-in">
      {{ content }}
    </main>
    {% include footer.html %}
    <script src="{{ '/assets/js/toc.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  </body>
</html>
